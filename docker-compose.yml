version: "3.9"

services:
  backend:
    image: python:3.11-slim
    command: ["sleep", "infinity"]
    working_dir: /app
    volumes:
      - ./backend:/app

  frontend:
    image: node:20
    command: ["sleep", "infinity"]
    working_dir: /app
    volumes:
      - ./frontend:/app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
